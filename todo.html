<!doctype html>
<html>
  <head>
    <title>Advanced To-Do App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <header>
        <h1>🚀 My Tasks</h1>
        <p>Stay productive every day</p>
      </header>

      <div class="input-box">
        <input type="text" placeholder="Add a new task..." />
        <button>Add</button>
      </div>

      <ul class="task-list">
        <li>Learn HTML</li>
        <li>Master CSS</li>
        <li>Build Projects</li>
      </ul>
    </div>
  </body>
</html>
